<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDGI — Demo de Fichaje</title>

<style>
  :root {
    --bg: #f0f2f5;
    --white: #ffffff;
    --primary: #2563eb;
    --primary-dark: #1e4fcc;
    --border: #d1d5db;
    --text: #1f2937;
    --text-soft: #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 10px;
  }

  .tablet {
    background: var(--white);
    width: 420px;
    border-radius: 26px;
    padding: 28px;
    box-shadow: 0 0 25px rgba(0,0,0,0.12);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .logo {
    text-align: center;
  }

  .logo img {
    height: 60px;
  }

  .title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .worker-select {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .worker-btn {
    padding: 14px;
    border-radius: 10px;
    border: 2px solid var(--border);
    font-size: 17px;
    font-weight: 600;
    background: var(--white);
    cursor: pointer;
    transition: 0.2s;
  }

  .worker-btn:hover {
    border-color: var(--primary);
  }

  .actions {
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .btn-main {
    background: var(--primary);
    color: white;
    padding: 16px;
    font-size: 19px;
    font-weight: 700;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn-main:hover {
    background: var(--primary-dark);
  }

  .btn-secondary {
    background: #e5e7eb;
    color: var(--text);
    padding: 16px;
    font-size: 17px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
  }

  .message {
    display: none;
    text-align: center;
    padding: 18px;
    background: #dcfce7;
    border: 1px solid #86efac;
    color: #166534;
    border-radius: 12px;
    margin-top: 20px;
    font-weight: 600;
  }
</style>
</head>

<body>

<div class="tablet">

  <div class="logo">
    <img src="img/logo-sidgi.png" alt="SIDGI">
  </div>

  <div class="title">Demo del sistema de fichaje</div>

  <div id="worker-step" class="worker-select">
    <button class="worker-btn" onclick="selectWorker('Trabajador 1')">Trabajador 1</button>
    <button class="worker-btn" onclick="selectWorker('Trabajador 2')">Trabajador 2</button>
    <button class="worker-btn" onclick="selectWorker('Trabajador 3')">Trabajador 3</button>
  </div>

  <div id="action-step" class="actions">
    <button class="btn-main" onclick="fichar('Entrada')">Fichar entrada</button>
    <button class="btn-main" onclick="fichar('Salida')">Fichar salida</button>
    <button class="btn-secondary" onclick="firma()">Firmar</button>
  </div>

  <div id="msg" class="message"></div>

</div>


<script>
let selectedWorker = null;

function selectWorker(name) {
  selectedWorker = name;

  document.getElementById('worker-step').style.display = 'none';
  document.getElementById('action-step').style.display = 'flex';
}

function fichar(tipo) {
  const msg = document.getElementById('msg');
  msg.style.display = 'block';
  msg.innerHTML = selectedWorker + " ha fichado " + tipo + " correctamente.";

  setTimeout(() => {
    location.reload();
  }, 1800);
}

function firma() {
  const msg = document.getElementById('msg');
  msg.style.display = 'block';
  msg.innerHTML = selectedWorker + " ha firmado correctamente.";

  setTimeout(() => {
    location.reload();
  }, 1800);
}
</script>

</body>
</html>
